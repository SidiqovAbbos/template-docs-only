<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project Documentation</title>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f8fafc; color: #1e293b; }
    .container { max-width: 1000px; margin: 0 auto; padding: 2rem; }
    header { background: #0f172a; color: white; padding: 2rem; margin-bottom: 2rem; border-radius: 0.5rem; }
    header h1 { font-size: 1.75rem; margin-bottom: 0.5rem; }
    header p { color: #94a3b8; }
    nav { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 2rem; }
    nav button { padding: 0.5rem 1rem; border: 1px solid #e2e8f0; background: white; border-radius: 0.375rem; cursor: pointer; font-size: 0.875rem; }
    nav button.active { background: #0f172a; color: white; border-color: #0f172a; }
    nav button:hover { background: #f1f5f9; }
    nav button.active:hover { background: #1e293b; }
    .doc-content { background: white; padding: 2rem; border-radius: 0.5rem; border: 1px solid #e2e8f0; line-height: 1.7; }
    .doc-content h1 { font-size: 1.5rem; margin: 1.5rem 0 0.75rem; padding-bottom: 0.5rem; border-bottom: 1px solid #e2e8f0; }
    .doc-content h2 { font-size: 1.25rem; margin: 1.25rem 0 0.5rem; }
    .doc-content h3 { font-size: 1.1rem; margin: 1rem 0 0.5rem; }
    .doc-content p { margin: 0.5rem 0; }
    .doc-content ul, .doc-content ol { margin: 0.5rem 0 0.5rem 1.5rem; }
    .doc-content code { background: #f1f5f9; padding: 0.125rem 0.375rem; border-radius: 0.25rem; font-size: 0.875rem; }
    .doc-content pre { background: #1e293b; color: #e2e8f0; padding: 1rem; border-radius: 0.5rem; overflow-x: auto; margin: 1rem 0; }
    .doc-content pre code { background: none; padding: 0; color: inherit; }
    .doc-content table { width: 100%; border-collapse: collapse; margin: 1rem 0; }
    .doc-content th, .doc-content td { padding: 0.5rem 0.75rem; border: 1px solid #e2e8f0; text-align: left; }
    .doc-content th { background: #f8fafc; font-weight: 600; }
    .mermaid { margin: 1rem 0; text-align: center; }
    .loading { text-align: center; padding: 2rem; color: #64748b; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1 id="project-title">Project Documentation</h1>
      <p id="project-desc">Architecture, API specs, and integration flows</p>
    </header>
    <nav id="nav"></nav>
    <div class="doc-content" id="content">
      <div class="loading">Loading documentation...</div>
    </div>
  </div>

  <script>
    const docs = [
      { id: 'architecture', label: 'Architecture', file: 'docs/architecture.md' },
      { id: 'api-spec', label: 'API Specification', file: 'docs/api-spec.md' },
      { id: 'data-model', label: 'Data Model', file: 'docs/data-model.md' },
      { id: 'integration-flow', label: 'Integration Flow', file: 'docs/integration-flow.md' },
    ];

    let currentDoc = docs[0].id;

    function renderNav() {
      const nav = document.getElementById('nav');
      nav.innerHTML = docs.map(d =>
        `<button class="${d.id === currentDoc ? 'active' : ''}" onclick="loadDoc('${d.id}')">${d.label}</button>`
      ).join('');
    }

    async function loadDoc(id) {
      currentDoc = id;
      renderNav();
      const content = document.getElementById('content');
      const doc = docs.find(d => d.id === id);
      try {
        const resp = await fetch(doc.file);
        if (!resp.ok) throw new Error('Not found');
        const md = await resp.text();
        content.innerHTML = marked.parse(md);
        // Render mermaid diagrams
        document.querySelectorAll('pre code.language-mermaid').forEach(block => {
          const div = document.createElement('div');
          div.className = 'mermaid';
          div.textContent = block.textContent;
          block.parentElement.replaceWith(div);
        });
        await mermaid.run();
      } catch {
        content.innerHTML = '<p>Documentation not yet generated. Check PLAN.md for requirements.</p>';
      }
    }

    mermaid.initialize({ startOnLoad: false, theme: 'neutral' });
    renderNav();
    loadDoc(currentDoc);
  </script>
</body>
</html>
